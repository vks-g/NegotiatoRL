# OpenEnv Manifest for NegotiationEnv
name: negotiation_env
version: "1.0.0"
description: |
  A Multi-Issue Bilateral Negotiation RL Environment for LLM Post-Training.
  
  The agent plays one party in a negotiation against a parameterized counterpart.
  Features 5 negotiation issues, 5 opponent strategies, and 4 GRPO-compatible
  reward signals for rich gradient information.

# Environment metadata
env_type: turn-based
domain: negotiation
difficulty: medium

# Server configuration
server:
  port: 8000
  workers: 4
  max_concurrent_sessions: 100

# Episode configuration
episode:
  max_rounds: 10
  timeout_seconds: 30

# Task definitions (3 tasks with graders, easy → medium → hard)
tasks:
  - name: easy_conceder
    description: |
      Negotiate against a Conceder opponent who rapidly moves toward the midpoint
      and accepts offers at or above their BATNA. Tests basic negotiation skills
      and ability to recognize good deals.
    difficulty: easy
    max_steps: 10
    grader:
      fn: graders:grade_easy_conceder
      score_range: [0.0, 1.0]
      success_threshold: 0.5
      deterministic: true
    reset_params:
      strategy_name: conceder
      max_rounds: 10
      seed: 42

  - name: medium_tft
    description: |
      Negotiate against a Tit-for-Tat opponent who mirrors your concession rate.
      Tests strategic reciprocity - agent must learn to make measured concessions
      to induce cooperation from the counterpart.
    difficulty: medium
    max_steps: 10
    grader:
      fn: graders:grade_medium_tft
      score_range: [0.0, 1.0]
      success_threshold: 0.5
      deterministic: true
    reset_params:
      strategy_name: tit_for_tat
      max_rounds: 10
      seed: 42

  - name: hard_hardliner
    description: |
      Negotiate against a Hardliner opponent who barely concedes and demands
      near-aspiration utility. Tests patience, persistence, and ability to
      extract concessions from stubborn opponents under time pressure.
    difficulty: hard
    max_steps: 15
    grader:
      fn: graders:grade_hard_hardliner
      score_range: [0.0, 1.0]
      success_threshold: 0.4
      deterministic: true
    reset_params:
      strategy_name: hardliner
      max_rounds: 15
      seed: 42

# Tags for discovery
tags:
  - negotiation
  - multi-issue
  - imperfect-information
  - bilateral
  - grpo-compatible
  - llm-training
